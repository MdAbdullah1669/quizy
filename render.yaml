services:
  - type: web
    name: quizy-backend
    env: node
    plan: free
    branch: main
    rootDirectory: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    pullRequestPreviews: false
    # Environment variables to configure in the Render dashboard
    envVars:
      - key: MONGODB_URI
      - key: JWT_SECRET
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://quizy-online-quize-platfrom.netlify.app
      - key: EMAIL_HOST
      - key: EMAIL_USER
      - key: EMAIL_PASS
      - key: EMAIL_FROM
